    function renderTable(data) {
        const tbody = document.getElementById('citations-body');
        tbody.innerHTML = '';
        data.forEach(function(c) {
            const tr = document.createElement('tr');
            const titleCell = c.url
                ? '<a href="' + c.url + '" target="_blank" rel="noopener">' + c.title + '</a>'
                : c.title;
            const yearText = c.year;
            tr.innerHTML =
                '<td class="col-publisher">' + c.publisher + '</td>' +
                '<td class="col-authors">' + c.authors + '</td>' +
                '<td class="col-title">' + titleCell + '</td>' +
                '<td class="col-year">' + yearText + '</td>';
            tbody.appendChild(tr);
        });
    }

    let currentSort = { col: null, dir: 'asc' };

    function sortTable(col, type) {
        const headers = document.querySelectorAll('th');
        headers.forEach(function(h) {
            h.classList.remove('sorted-asc', 'sorted-desc');
        });

        if (currentSort.col === col) {
            currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
        } else {
            currentSort.col = col;
            currentSort.dir = 'asc';
        }

        const clickedHeader = document.querySelector('th[data-col="' + col + '"]');
        clickedHeader.classList.add(currentSort.dir === 'asc' ? 'sorted-asc' : 'sorted-desc');

        const sorted = citations.slice().sort(function(a, b) {
            let valA = a[col];
            let valB = b[col];

            if (valA === null || valA === undefined) valA = type === 'number' ? -1 : '\uffff';
            if (valB === null || valB === undefined) valB = type === 'number' ? -1 : '\uffff';

            if (type === 'number') {
                return currentSort.dir === 'asc' ? valA - valB : valB - valA;
            } else {
                valA = String(valA).toLowerCase();
                valB = String(valB).toLowerCase();
                if (valA < valB) return currentSort.dir === 'asc' ? -1 : 1;
                if (valA > valB) return currentSort.dir === 'asc' ? 1 : -1;
                return 0;
            }
        });

        renderTable(sorted);
    }

    document.querySelectorAll('th.sortable').forEach(function(th) {
        th.addEventListener('click', function() {
            sortTable(th.dataset.col, th.dataset.type);
        });
    });

    renderTable(citations);
    </script>
</body>
</html>
