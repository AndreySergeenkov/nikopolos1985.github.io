        .cols.c3 { grid-template-columns: 1fr 1fr 1fr; }
        .cols.c2 { grid-template-columns: 1fr 1fr; }

        // ---- Use Pretext to measure heights, then distribute blocks into columns ----

        // Measure the pixel height a paragraph will occupy at a given column width
        function measureBlockHeight(block, colWidth) {
            if (block.type === 'photo') return 200 // fixed photo height estimate
            const prepared = prepare(block.text, FONT)
            const result = layout(prepared, colWidth, LINE_HEIGHT)
            return result.height + 10 // +10 for paragraph margin
        }

        // Measure an article entry height (title + pub line)
        function measureArticleHeight(title, colWidth) {
            const titleFont = 'bold 13px "Playfair Display", serif'
            const prepared = prepare(title, titleFont)
            const result = layout(prepared, colWidth, 17)
            return result.height + 15 + 12 // pub line + spacing/border
        }

        // Greedy column balancer: assign items to the shortest column
        function balanceIntoColumns(items, heights, numCols) {
            const cols = Array.from({ length: numCols }, () => [])
            const colHeights = new Array(numCols).fill(0)
            for (let i = 0; i < items.length; i++) {
                let shortest = 0
                for (let c = 1; c < numCols; c++) {
                    if (colHeights[c] < colHeights[shortest]) shortest = c
                }
                cols[shortest].push(i)
                colHeights[shortest] += heights[i]
            }
            return cols
        }

        // ---- Render to DOM ----

        function renderBlock(block) {
            if (block.type === 'photo') {
                const div = document.createElement('div')
                div.className = 'photo'
                div.innerHTML = '<img src="/500.jpg" alt="Andrey Sergeenkov">'
                return div
            }
            const p = document.createElement('p')
            p.textContent = block.text
            return p
        }

        function renderArticle(title, pub) {
            const div = document.createElement('div')
            div.className = 'entry'
            div.innerHTML = `<div class="entry-title">${title}</div><div class="entry-pub">${pub}</div>`
            return div
        }

        function doLayout() {
            // Measure column width from actual DOM
            const topCol = document.getElementById('top-col-0')
            const colWidth = topCol.clientWidth - 24 // account for padding

            // 1. Measure all top blocks
            const blockHeights = blocks.map(b => measureBlockHeight(b, colWidth))

            // 2. Balance blocks across 3 columns using Pretext-measured heights
            const topAssignment = balanceIntoColumns(blocks, blockHeights, 3)

            // 3. Render top columns
            for (let c = 0; c < 3; c++) {
                const el = document.getElementById(`top-col-${c}`)
                el.innerHTML = ''
                for (const idx of topAssignment[c]) {
                    el.appendChild(renderBlock(blocks[idx]))
                }
            }

            // 4. Measure all article heights
            const artHeights = articles.map(([title]) => measureArticleHeight(title, colWidth))

            // 5. Balance articles across 3 columns
            const artAssignment = balanceIntoColumns(articles, artHeights, 3)

            // 6. Render article columns
            for (let c = 0; c < 3; c++) {
                const el = document.getElementById(`art-col-${c}`)
                el.innerHTML = ''
                for (const idx of artAssignment[c]) {
                    el.appendChild(renderArticle(articles[idx][0], articles[idx][1]))
                }
            }
        }

        document.fonts.ready.then(doLayout)

        let timer
        window.addEventListener('resize', () => {
            clearTimeout(timer)
            timer = setTimeout(doLayout, 150)
        })
